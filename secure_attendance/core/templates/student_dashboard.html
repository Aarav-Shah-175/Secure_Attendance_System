function getCSRFToken() {
    const cookie = document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken='));

    return cookie ? cookie.split('=')[1] : '';
}

async function signNonce(sessionId, nonce) {

    try {

        const privateBase64 = localStorage.getItem("device_private_key");

        if (!privateBase64) {
            alert("Device not registered.");
            return;
        }

        const binary = atob(privateBase64);
        const bytes = new Uint8Array(binary.length);

        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }

        const privateKey = await crypto.subtle.importKey(
            "pkcs8",
            bytes.buffer,
            {
                name: "ECDSA",
                namedCurve: "P-256"
            },
            false,
            ["sign"]
        );

        const encoder = new TextEncoder();
        const data = encoder.encode(nonce);

        const signature = await crypto.subtle.sign(
            {
                name: "ECDSA",
                hash: { name: "SHA-256" }
            },
            privateKey,
            data
        );

        const signatureBytes = new Uint8Array(signature);
        let binarySig = "";

        signatureBytes.forEach(b => binarySig += String.fromCharCode(b));

        const base64Signature = btoa(binarySig);

        const response = await fetch("/student/submit/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({
                session_id: sessionId,
                signed_nonce: base64Signature
            })
        });

        const text = await response.text();

        document.getElementById("attendanceStatus").innerText = text;

    }
    catch(err){
        alert("Signing error: " + err);
    }

}
